<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canyon Clash — War Plan 1.0</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --surface: #111923;
    --surface2: #1a2433;
    --border: #1e2d3d;
    --text: #c8d6e5;
    --text-dim: #5a7089;
    --accent: #00e5ff;
    --green: #00e676;
    --green-bg: rgba(0,230,118,0.08);
    --green-border: rgba(0,230,118,0.25);
    --red: #ff1744;
    --red-bg: rgba(255,23,68,0.08);
    --red-border: rgba(255,23,68,0.25);
    --blue: #448aff;
    --blue-bg: rgba(68,138,255,0.08);
    --blue-border: rgba(68,138,255,0.25);
    --yellow: #ffab00;
    --yellow-bg: rgba(255,171,0,0.08);
    --yellow-border: rgba(255,171,0,0.25);
    --phase-line: #1e2d3d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding: 32px 20px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(0,229,255,0.04) 0%, transparent 100%);
    position: relative;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #fff;
  }
  .header h1 span { color: var(--accent); }
  .header p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    letter-spacing: 2px;
  }

  /* ── STRATEGY BAR ── */
  .strategy-bar {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .strategy-pill {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* ── LAYOUT ── */
  .app {
    display: flex;
    min-height: calc(100vh - 160px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px;
    min-width: 240px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    padding: 0;
    overflow-y: auto;
  }
  .squad-group { border-bottom: 1px solid var(--border); }
  .squad-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .squad-header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .squad-header.green .dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .squad-header.red .dot { background: var(--red); box-shadow: 0 0 8px var(--red); }
  .squad-header.blue .dot { background: var(--blue); box-shadow: 0 0 8px var(--blue); }
  .squad-header.yellow .dot { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
  .squad-header.green { color: var(--green); }
  .squad-header.red { color: var(--red); }
  .squad-header.blue { color: var(--blue); }
  .squad-header.yellow { color: var(--yellow); }
  .squad-subtitle {
    padding: 0 18px 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .member-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 18px;
    border: none;
    background: transparent;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    letter-spacing: 1px;
    position: relative;
  }
  .member-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: transparent;
    transition: background 0.15s;
  }
  .member-btn:hover { background: rgba(255,255,255,0.03); }
  .member-btn .tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    padding: 2px 8px;
    border-radius: 4px;
    min-width: 36px;
    text-align: center;
  }
  .squad-group.green .tag { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .squad-group.red .tag { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .squad-group.blue .tag { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
  .squad-group.yellow .tag { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }

  .member-btn.active { background: rgba(255,255,255,0.04); }
  .squad-group.green .member-btn.active::before { background: var(--green); }
  .squad-group.red .member-btn.active::before { background: var(--red); }
  .squad-group.blue .member-btn.active::before { background: var(--blue); }
  .squad-group.yellow .member-btn.active::before { background: var(--yellow); }

  /* ── MAIN CONTENT ── */
  .main {
    flex: 1;
    padding: 28px 36px;
    overflow-y: auto;
  }

  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    text-align: center;
    color: var(--text-dim);
  }
  .welcome-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }
  .welcome h2 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
    color: var(--text);
  }
  .welcome p {
    font-size: 14px;
    max-width: 320px;
    line-height: 1.6;
  }

  /* ── MEMBER HEADER ── */
  .member-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 32px;
    animation: fadeSlide 0.3s ease;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .member-header .badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    padding: 6px 14px;
    border-radius: 6px;
    font-weight: 700;
  }
  .member-header .info h2 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .member-header .info p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* ── TIMELINE ── */
  .timeline {
    position: relative;
    padding-left: 32px;
    animation: fadeSlide 0.35s ease;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 7px;
    top: 12px;
    bottom: 12px;
    width: 2px;
    background: repeating-linear-gradient(
      180deg,
      var(--phase-line) 0px,
      var(--phase-line) 6px,
      transparent 6px,
      transparent 12px
    );
  }

  .tl-event {
    position: relative;
    margin-bottom: 20px;
    animation: fadeSlide 0.3s ease;
  }
  .tl-event:last-child { margin-bottom: 0; }

  .tl-dot {
    position: absolute;
    left: -29px;
    top: 16px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg);
    z-index: 1;
  }
  .tl-event.phase .tl-dot {
    width: 16px; height: 16px;
    left: -31px; top: 14px;
    border-color: var(--accent);
    background: var(--accent);
    box-shadow: 0 0 12px rgba(0,229,255,0.4);
  }
  .tl-event.action .tl-dot { border-color: var(--text-dim); background: var(--surface2); }
  .tl-event.critical .tl-dot { border-color: var(--red); background: var(--red); box-shadow: 0 0 10px rgba(255,23,68,0.4); }
  .tl-event.captain .tl-dot { border-color: var(--yellow); background: var(--yellow); box-shadow: 0 0 10px rgba(255,171,0,0.4); }
  .tl-event.core .tl-dot { border-color: #ff6d00; background: #ff6d00; box-shadow: 0 0 14px rgba(255,109,0,0.5); }

  .tl-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    transition: border-color 0.2s;
  }
  .tl-event.phase .tl-card { border-color: rgba(0,229,255,0.2); background: rgba(0,229,255,0.03); }
  .tl-event.critical .tl-card { border-color: var(--red-border); background: var(--red-bg); }
  .tl-event.captain .tl-card { border-color: var(--yellow-border); background: var(--yellow-bg); }
  .tl-event.core .tl-card { border-color: rgba(255,109,0,0.25); background: rgba(255,109,0,0.06); }

  .tl-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .tl-event.captain .tl-time { color: var(--yellow); }
  .tl-event.critical .tl-time { color: var(--red); }
  .tl-event.core .tl-time { color: #ff6d00; }

  .tl-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
    margin-bottom: 6px;
  }
  .tl-tasks {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }
  .tl-tasks li {
    list-style: none;
    position: relative;
    padding-left: 18px;
    margin-bottom: 3px;
  }
  .tl-tasks li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--text-dim);
  }
  .tl-note {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    margin-top: 8px;
    padding: 6px 10px;
    background: rgba(0,229,255,0.05);
    border-radius: 4px;
    border-left: 2px solid rgba(0,229,255,0.3);
    letter-spacing: 0.5px;
  }
  .tl-event.captain .tl-note { color: var(--yellow); background: rgba(255,171,0,0.05); border-left-color: rgba(255,171,0,0.3); }
  .tl-event.critical .tl-note { color: var(--red); background: rgba(255,23,68,0.05); border-left-color: rgba(255,23,68,0.3); }
  .tl-event.core .tl-note { color: #ff6d00; background: rgba(255,109,0,0.05); border-left-color: rgba(255,109,0,0.3); }

  /* ── SHOT CALLS BAR ── */
  .shot-calls {
    margin-top: 36px;
    padding: 18px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    animation: fadeSlide 0.4s ease;
  }
  .shot-calls h3 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .shot-calls .calls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .call-chip {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .call-chip.active-call {
    color: var(--accent);
    border-color: rgba(0,229,255,0.3);
    background: rgba(0,229,255,0.06);
  }

  /* ── GOLD RULES ── */
  .gold-rules {
    margin-top: 16px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    animation: fadeSlide 0.45s ease;
  }
  .gold-rule {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 4px;
    background: rgba(255,171,0,0.06);
    border: 1px solid rgba(255,171,0,0.2);
    color: var(--yellow);
  }

  /* ── PHASE TABS ── */
  .phase-shell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    animation: fadeSlide 0.35s ease;
  }
  .phase-tabs {
    display: flex;
    gap: 10px;
    padding: 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(0,229,255,0.06) 0%, rgba(0,229,255,0.02) 100%);
  }
  .phase-tab {
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    padding: 10px 16px;
    border-radius: 999px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .phase-tab:hover {
    color: var(--text);
    border-color: rgba(0,229,255,0.22);
  }
  .phase-tab.active {
    color: var(--accent);
    border-color: rgba(0,229,255,0.32);
    background: rgba(0,229,255,0.08);
    box-shadow: inset 0 0 0 1px rgba(0,229,255,0.08);
  }
  .phase-stage {
    display: none;
    grid-template-columns: 320px minmax(0, 1fr);
    min-height: 540px;
  }
  .phase-stage.active {
    display: grid;
  }
  .phase-sidebar-panel {
    border-right: 1px solid var(--border);
    padding: 22px 18px;
    background: rgba(255,255,255,0.015);
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .phase-sidebar-head h3 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #fff;
  }
  .phase-sidebar-head p {
    margin-top: 6px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-dim);
  }
  .phase-window {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--accent);
  }
  .phase-task-stack {
    display: grid;
    gap: 14px;
  }
  .phase-task-stack .tl-event {
    margin-bottom: 0;
  }
  .phase-task-stack .tl-dot {
    display: none;
  }
  .phase-task-stack .tl-card {
    padding: 14px 16px;
  }
  .phase-map-stage {
    padding: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at top, rgba(0,229,255,0.05), transparent 38%),
      linear-gradient(180deg, rgba(255,255,255,0.015), transparent 50%);
  }
  .phase-map-board {
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .phase-map {
    display: block;
    width: 100%;
    max-width: 680px;
    height: auto;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: #000;
    box-shadow: 0 16px 40px rgba(0,0,0,0.25);
  }
  .phase-map-caption {
    max-width: 680px;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .phase-map-caption strong {
    color: var(--text);
    font-weight: 600;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 980px) {
    .phase-stage {
      grid-template-columns: 1fr;
    }
    .phase-sidebar-panel {
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
  }
  @media (max-width: 700px) {
    .app { flex-direction: column; }
    .sidebar {
      width: 100%;
      min-width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: 45vh;
    }
    .squad-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      padding: 8px 12px;
      gap: 4px;
    }
    .squad-header { padding: 6px 8px; font-size: 10px; width: auto; }
    .squad-subtitle { display: none; }
    .member-btn { width: auto; padding: 6px 10px; font-size: 13px; }
    .member-btn::before { display: none; }
    .member-btn .label { display: none; }
    .main { padding: 20px 16px; }
    .strategy-bar { gap: 6px; padding: 10px; }
    .strategy-pill { font-size: 10px; padding: 4px 10px; }
    .header h1 { font-size: 20px; letter-spacing: 4px; }
    .phase-tabs {
      flex-wrap: wrap;
      padding: 10px;
      gap: 8px;
    }
    .phase-tab {
      width: 100%;
      text-align: center;
    }
    .phase-sidebar-panel,
    .phase-map-stage {
      padding: 14px;
    }
    .phase-stage {
      min-height: 0;
    }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Canyon <span>Clash</span></h1>
  <p>WAR PLAN 1.0 — INTERACTIVE BRIEFING</p>
</div>

<div class="strategy-bar">
  <div class="strategy-pill">Control map early</div>
  <div class="strategy-pill">Punish overcommit</div>
  <div class="strategy-pill">Scale into Core</div>
  <div class="strategy-pill">Win through positioning</div>
</div>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main">
    <div class="welcome">
      <div class="welcome-icon">⬡</div>
      <h2>Select a member</h2>
      <p>Click any callsign on the left to reveal their mission timeline and objectives.</p>
    </div>
  </main>
</div>

<script>
const SQUADS = [
  { id:'A', name:'A Squad', subtitle:'Support / Flex', color:'green',
    members:['A1','A2','A3','A4','A5'] },
  { id:'B', name:'B Squad', subtitle:'Hammer Team — Critical', color:'red',
    members:['B1','B2','B3','B4','B5'] },
  { id:'C', name:'C Squad', subtitle:'Safe Control', color:'blue',
    members:['C1','C2','C3','C4','C5'] },
  { id:'D', name:'D Squad', subtitle:'High Power — Orange', color:'yellow',
    members:['D1','D2','D3','D4','D5'] },
];

const SHOT_CALLS = [
  { time:'5:00', text:'Captain up — D engage — B wait' },
  { time:'5:30', text:'GO — hit bases now' },
  { time:'8:30', text:'Rotate Phase 2' },
  { time:'9:00', text:'Military open — push' },
  { time:'15:00', text:'Second Captain — watch bases' },
  { time:'18:30', text:'CORE SETUP — collapse' },
  { time:'20:00', text:'CORE LIVE — ALL IN' },
];

const PHASE_MAPS = {
  phase1: {
    tab: 'PHASE 1',
    title: 'Phase 1 — Setup & Captain Trap',
    window: '0:00 → 8:30',
    src: 'Plan.jpg',
    alt: 'Canyon Clash tactical map for phase 1',
    caption: 'Initial positions and early control. Use the number matching your callsign on this map for your exact opening spot.'
  },
  phase2: {
    tab: 'PHASE 2',
    title: 'Phase 2 — Military Bases & Map Control',
    window: '8:30 → 19:30',
    src: 'plan_.jpg',
    alt: 'Canyon Clash tactical map for phase 2',
    caption: 'Rotation starts at 8:30, military bases open at 9:00, and this phase runs until Core setup starts at 19:30.'
  },
  core: {
    tab: 'CORE',
    title: 'Core Phase — Setup, Spawn & Escort',
    window: '19:30 → Until Captured',
    src: 'plan__.jpg',
    alt: 'Canyon Clash tactical map for the core phase',
    caption: 'Core setup begins at 19:30, the Core spawns at 20:00, and this phase lasts until the Core is captured or dropped into the next state.'
  },
  phase3: {
    tab: 'PHASE 3',
    title: 'Phase 3 — Post-Core Reset & Deny',
    window: 'Post-Core → End',
    src: 'plan_.jpg',
    alt: 'Canyon Clash tactical map for phase 3',
    caption: 'After the Core sequence, the team returns to phase-2 positions to lock the map and deny any comeback.'
  }
};

function getPhaseKey(time) {
  if (time === '0:00' || time === '5:00') return 'phase1';
  if (time === '8:30' || time === '9:00' || time === '15:00') return 'phase2';
  if (time === '19:30' || time === '20:00') return 'core';
  return 'phase3';
}

function selectPhaseTab(phaseKey) {
  document.querySelectorAll('.phase-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.phase === phaseKey);
  });
  document.querySelectorAll('.phase-stage').forEach(panel => {
    panel.classList.toggle('active', panel.dataset.phase === phaseKey);
  });
}

function getMemberData(id) {
  const squad = id[0];
  const num = parseInt(id[1]);

  const events = [];

  // ── PHASE 1 ──
  if (squad === 'A') {
    events.push({ type:'phase', time:'0:00', title:'PHASE 1 — Setup & Disruption',
      tasks:['Secure initial capture points','Hold lower left refineries','Cluster with squad to reinforce while capturing','Prepare for Military Base release at 9:00'],
      note:'Stay grouped with A Squad for mutual support' });
  }
  if (squad === 'B' && num <= 4) {
    events.push({ type:'phase', time:'0:00', title:'PHASE 1 — Setup & Disruption',
      tasks:['Secure initial capture points','Hold upper right refineries','Monitor Canyon Captain timer (spawns at 5:00)','Support B5 when help is needed'],
      note:'You are the Hammer Team. Stay ready for the Captain trap at 5:00' });
  }
  if (squad === 'B' && num === 5) {
    events.push({ type:'phase', time:'0:00', title:'PHASE 1 — Setup & Disruption',
      tasks:['Capture & hold top-right lower refinery','Defend position until Phase 2'],
      note:'Solo hold. Call for B Squad backup if pressured' });
  }
  if (squad === 'C') {
    events.push({ type:'phase', time:'0:00', title:'PHASE 1 — Safe Control',
      tasks:['Hold the Hospital','Hold 2 Refineries near spawn','Attack from respawn while waiting for teleport cooldown'],
      note:'Constant pressure from respawn = resource denial' });
  }
  if (squad === 'D' && num <= 2) {
    events.push({ type:'phase', time:'0:00', title:'PHASE 1 — Hunter Mode',
      tasks:['Hunt the strongest enemy players','Disrupt large enemy groups','Stay mobile and unpredictable'],
      note:'You are the tip of the spear. High power, high impact' });
  }
  if (squad === 'D' && num >= 3) {
    events.push({ type:'phase', time:'0:00', title:'PHASE 1 — Deep Capture',
      tasks:['Capture hospital near enemy spawn','Capture refinery near enemy spawn','Hold position behind enemy lines'],
      note:'Deep territory capture. Expect resistance' });
  }

  // ── 5:00 CAPTAIN ──
  if (squad === 'D' && num <= 2) {
    events.push({ type:'captain', time:'5:00', title:'CANYON CAPTAIN — Trap Play',
      tasks:['Attack the Canyon Captain','WAIT for enemy to teleport in','Draw their attention and hold the fight','Once B Squad confirms base destruction, finish the Captain'],
      note:'BAIT PLAY — You draw them in, B Squad punishes' });
  }
  if (squad === 'B' && num >= 2 && num <= 4) {
    events.push({ type:'critical', time:'5:00', title:'CANYON CAPTAIN — Base Assault',
      tasks:['Wait for enemy to teleport toward Captain','Confirm enemies have committed to Captain fight','ATTACK and destroy exposed enemy bases with F2/F3','Send enemies back to spawn','Join D1/D2 at Captain fight afterward'],
      note:'CRITICAL TIMING — Do NOT move early. Wait for the teleport' });
  }
  if (squad === 'B' && num === 1) {
    events.push({ type:'captain', time:'5:00', title:'CANYON CAPTAIN — Support',
      tasks:['Hold upper right position','Watch for enemy rotations','Support B2/B3/B4 base assault if needed','Maintain refinery control'],
      note:'Anchor position while the rest of B Squad executes the trap' });
  }
  if (squad === 'A') {
    events.push({ type:'action', time:'5:00', title:'CANYON CAPTAIN — Hold Position',
      tasks:['Maintain capture point control','Reinforce lower left refineries','Stand by for any support calls'] });
  }
  if (squad === 'C') {
    events.push({ type:'action', time:'5:00', title:'CANYON CAPTAIN — Hold & Pressure',
      tasks:['Continue holding Hospital and Refineries','Maintain respawn pressure on enemy'] });
  }
  if (squad === 'D' && num >= 3) {
    events.push({ type:'action', time:'5:00', title:'CANYON CAPTAIN — Hold Deep Position',
      tasks:['Hold hospital and refinery near enemy spawn','Apply backline pressure while enemy focuses on Captain'] });
  }

  // ── TRANSITION ──
  events.push({ type:'action', time:'8:30', title:'TRANSITION — Rotate to Phase 2',
    tasks:['Begin moving toward Phase 2 positions','Military Bases open in 30 seconds'],
    note:'Shot call: "Rotate Phase 2"' });

  // ── PHASE 2 ──
  if (squad === 'A' && num <= 3) {
    events.push({ type:'phase', time:'9:00', title:'PHASE 2 — Upper Military Base',
      tasks:['Capture and secure the UPPER military base','Stay close enough to reinforce quickly','Support each other within the base area'],
      note:'Priority objective. Do not overextend from base' });
  }
  if (squad === 'A' && num === 4) {
    events.push({ type:'phase', time:'9:00', title:'PHASE 2 — Water Refinery Control',
      tasks:['Retain control of water refineries','Coordinate with B5 for joint defense','Cover the refinery zone between squads'],
      note:'Joint task with B5. Communicate positions' });
  }
  if (squad === 'A' && num === 5) {
    events.push({ type:'phase', time:'9:00', title:'PHASE 2 — Water Refinery Hold',
      tasks:['Retain control of water refinery','No movement needed — anchor this position','Call for backup only if overwhelmed'],
      note:'Static hold. You are the anchor point' });
  }
  if (squad === 'B' && num <= 4) {
    events.push({ type:'phase', time:'9:00', title:'PHASE 2 — Lower Military Base',
      tasks:['Capture and secure the LOWER military base','Stay close enough to reinforce quickly','Disrupt enemy rotations between objectives'],
      note:'Mirror A Squad on the lower base. Stay tight' });
  }
  if (squad === 'B' && num === 5) {
    events.push({ type:'phase', time:'9:00', title:'PHASE 2 — Water Refinery Takeover',
      tasks:['Take over control of water refineries','Coordinate with A4 for joint defense','Hold the refinery zone together'],
      note:'Joint task with A4. You are the handoff point' });
  }
  if (squad === 'C' && (num === 1 || num === 3)) {
    events.push({ type:'phase', time:'9:00', title:'PHASE 2 — Opposite Side Push',
      tasks:['Push to the opposite side of the map','Target enemy hospital and refinery','Establish secondary pressure point'],
      note:'Split from C Squad when safe. Expand map control' });
  }
  if (squad === 'C' && (num === 2 || num === 4 || num === 5)) {
    events.push({ type:'phase', time:'9:00', title:'PHASE 2 — Hold Original Position',
      tasks:['Continue holding Hospital and Refineries','Maintain spawn pressure','Anchor C Squad presence on this side of the map'],
      note:'You are the stable core. C1/C3 will push out — you hold the line' });
  }
  if (squad === 'D' && num <= 2) {
    events.push({ type:'phase', time:'9:00', title:'PHASE 2 — Seek & Destroy',
      tasks:['Continue hunting high-power enemy players','Maintain control of military bases if needed','Flex between objectives based on enemy pressure','Disrupt enemy coordination'],
      note:'Roam and respond. Your mobility is the advantage' });
  }
  if (squad === 'D' && (num === 3 || num === 4)) {
    events.push({ type:'phase', time:'9:00', title:'PHASE 2 — Upper Right Refineries',
      tasks:['Take over control of upper right water refineries','Hold this position through Phase 2','During second Canyon Captain: destroy empty opponent bases'],
      note:'See Phase 1 B Squad instructions for base assault timing' });
  }
  if (squad === 'D' && num === 5) {
    events.push({ type:'phase', time:'9:00', title:'PHASE 2 — Enemy Side Hold',
      tasks:['Remain in position near opponent hospital','Continue holding water refineries on enemy side','Apply sustained backline pressure'],
      note:'No rotation needed. Keep the enemy honest in their backline' });
  }

  // ── 15:00 SECOND CAPTAIN ──
  if (squad === 'D' && num <= 2) {
    events.push({ type:'captain', time:'15:00', title:'SECOND CAPTAIN — Repeat Trap',
      tasks:['Attack Canyon Captain again','Repeat bait play if enemy commits','Call out enemy movements'],
      note:'Same playbook as 5:00. Punish any overcommit' });
  }
  if (squad === 'D' && (num === 3 || num === 4)) {
    events.push({ type:'critical', time:'15:00', title:'SECOND CAPTAIN — Base Destruction',
      tasks:['Watch for enemy teleport toward Captain','Destroy empty opponent bases while they are distracted','Follow Phase 1 B Squad trap instructions'],
      note:'CRITICAL — Same timing discipline as B Squad at 5:00' });
  }
  if (squad === 'B' && num <= 4) {
    events.push({ type:'captain', time:'15:00', title:'SECOND CAPTAIN — Watch Bases',
      tasks:['Monitor for base exposure opportunities','Support D3/D4 base assault if applicable','Maintain lower military base control'],
      note:'Stay alert for the trap window. Communicate with D Squad' });
  }
  if (squad === 'B' && num === 5) {
    events.push({ type:'action', time:'15:00', title:'SECOND CAPTAIN — Hold Position',
      tasks:['Continue holding water refineries','Monitor enemy movements near your zone'] });
  }
  if (squad === 'A') {
    events.push({ type:'action', time:'15:00', title:'SECOND CAPTAIN — Maintain Objectives',
      tasks:['Hold current positions','Reinforce upper military base if pressured'] });
  }
  if (squad === 'C') {
    events.push({ type:'action', time:'15:00', title:'SECOND CAPTAIN — Hold & Watch',
      tasks:['Maintain all held positions','Prepare mentally for Core phase at 20:00'] });
  }
  if (squad === 'D' && num === 5) {
    events.push({ type:'action', time:'15:00', title:'SECOND CAPTAIN — Hold',
      tasks:['Continue holding enemy-side positions','Apply pressure while enemy focuses on Captain'] });
  }

  // ── CORE SETUP ──
  if (squad === 'C' || squad === 'D') {
    events.push({ type:'core', time:'19:30', title:'CORE SETUP — Collapse to Center',
      tasks:['Collapse toward the center of the map','Create a safe tunnel / corridor for the Core runner','Send your F1 march to the Core in preparation'],
      note:'Shot call at 18:30: "CORE SETUP — collapse". Be in position by 19:30' });
  }
  if (squad === 'A' || squad === 'B') {
    events.push({ type:'action', time:'19:30', title:'CORE SETUP — Hold Positions',
      tasks:['Maintain all current positions and objectives','Do NOT rotate to center','Your map control enables the Core play'],
      note:'A & B Squads anchor the map while C & D execute the Core' });
  }

  // ── 20:00 CORE ──
  if (squad === 'D' && num <= 2) {
    events.push({ type:'core', time:'20:00', title:'CORE SPAWNS — Grab & Carry',
      tasks:['Grab the Core immediately','Carry it toward our base','If you fall, another D/C member picks it up','Move through the protected corridor'],
      note:'YOU are the primary Core runner. This is the win condition' });
  }
  if (squad === 'D' && num >= 3) {
    events.push({ type:'core', time:'20:00', title:'CORE SPAWNS — Defend the Carrier',
      tasks:['Protect D1/D2 as they carry the Core','Engage enemy tanks trying to intercept','Destroy enemy bases threatening the route','Swarm around the carrier to confuse enemy targeting'],
      note:'March with the carrier. Make target acquisition difficult for the enemy' });
  }
  if (squad === 'C') {
    events.push({ type:'core', time:'20:00', title:'CORE SPAWNS — Corridor Defense',
      tasks:['Defend the Core carrier','Keep the corridor clear','Engage or block interceptors','Pick up the Core if D1/D2 are unavailable'],
      note:'You are the escort. The carrier must reach base' });
  }
  if (squad === 'A' || squad === 'B') {
    events.push({ type:'core', time:'20:00', title:'CORE SPAWNS — Map Anchor',
      tasks:['Continue holding military bases and refineries','Deny enemy flanking routes','Prevent any comeback or counter-push'],
      note:'Your control wins us the game. Hold the line' });
  }

  // ── POST CORE ──
  events.push({ type:'action', time:'POST', title:'Post-Core — Reset & Deny',
    tasks:['Return to Phase 2 positions','Maintain full map control','Deny any enemy comeback attempt'],
    note:'Do not relax. Stay in formation until victory is confirmed' });

  return events;
}

function getSquadInfo(id) {
  const squad = id[0];
  const labels = {
    A: { name:'A Squad', role:'Support / Flex', color:'green' },
    B: { name:'B Squad', role:'Hammer Team', color:'red' },
    C: { name:'C Squad', role:'Safe Control', color:'blue' },
    D: { name:'D Squad', role:'High Power', color:'yellow' },
  };
  return labels[squad];
}

// ── BUILD SIDEBAR ──
const sidebar = document.getElementById('sidebar');
SQUADS.forEach(sq => {
  const group = document.createElement('div');
  group.className = `squad-group ${sq.color}`;
  group.innerHTML = `
    <div class="squad-header ${sq.color}"><span class="dot"></span>${sq.name}</div>
    <div class="squad-subtitle">${sq.subtitle}</div>
  `;
  sq.members.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'member-btn';
    btn.dataset.id = m;
    btn.innerHTML = `<span class="tag">${m}</span><span class="label">${m}</span>`;
    btn.onclick = () => selectMember(m);
    group.appendChild(btn);
  });
  sidebar.appendChild(group);
});

// ── SELECT MEMBER ──
function selectMember(id) {
  document.querySelectorAll('.member-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll(`.member-btn[data-id="${id}"]`).forEach(b => b.classList.add('active'));

  const info = getSquadInfo(id);
  const events = getMemberData(id);
  const main = document.getElementById('main');

  const badgeColors = {
    green: `background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)`,
    red: `background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)`,
    blue: `background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)`,
    yellow: `background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border)`,
  };

  const phaseOrder = ['phase1', 'phase2', 'core', 'phase3'];
  const groupedEvents = phaseOrder.map(key => ({
    key,
    ...PHASE_MAPS[key],
    events: events.filter(ev => getPhaseKey(ev.time) === key),
  }));

  let html = `
    <div class="member-header">
      <div class="badge" style="${badgeColors[info.color]}">${id}</div>
      <div class="info">
        <h2>${id} · ${info.name}</h2>
        <p>${info.role} · Select your number on each phase map, then follow the tasks in order.</p>
      </div>
    </div>
  `;
  html += `
    <section class="phase-shell">
      <div class="phase-tabs">
        ${groupedEvents.map((phase, index) => `
          <button
            class="phase-tab ${index === 0 ? 'active' : ''}"
            type="button"
            data-phase="${phase.key}"
          >${phase.tab}</button>
        `).join('')}
      </div>
  `;

  groupedEvents.forEach((phase, phaseIndex) => {
    html += `
      <section
        class="phase-stage ${phaseIndex === 0 ? 'active' : ''}"
        data-phase="${phase.key}"
        style="animation-delay:${phaseIndex*0.05}s"
      >
        <aside class="phase-sidebar-panel">
          <div class="phase-sidebar-head">
            <div class="phase-window">${phase.window}</div>
            <h3>${phase.title}</h3>
            <p>${phase.caption}</p>
          </div>
          <div class="phase-task-stack">
    `;

    phase.events.forEach((ev, i) => {
      html += `
            <div class="tl-event ${ev.type}" style="animation-delay:${i*0.05}s">
              <div class="tl-card">
                <div class="tl-time">${ev.time}</div>
                <div class="tl-title">${ev.title}</div>
                <ul class="tl-tasks">
                  ${ev.tasks.map(t => `<li>${t}</li>`).join('')}
                </ul>
                ${ev.note ? `<div class="tl-note">${ev.note}</div>` : ''}
              </div>
            </div>
      `;
    });

    html += `
          </div>
        </aside>
        <div class="phase-map-stage">
          <div class="phase-map-board">
            <img class="phase-map" src="${phase.src}" alt="${phase.alt}">
            <div class="phase-map-caption">
              <strong>${id}</strong> follows the numbered slot shown on this map for <strong>${phase.title}</strong>.
            </div>
          </div>
        </div>
      </section>
    `;
  });

  html += `</section>`;

  // Shot calls
  const relevantTimes = events.map(e => e.time);
  html += `
    <div class="shot-calls">
      <h3>Shot Calls — Listen For</h3>
      <div class="calls">
        ${SHOT_CALLS.map(sc => {
          const isActive = relevantTimes.some(t => sc.time.includes(t) || t.includes(sc.time));
          return `<div class="call-chip ${isActive ? 'active-call' : ''}">${sc.time} → ${sc.text}</div>`;
        }).join('')}
      </div>
    </div>
  `;

  html += `
    <div class="gold-rules">
      <div class="gold-rule">✦ Capture, Capture, Capture</div>
      <div class="gold-rule">✦ Play Your Role</div>
      <div class="gold-rule">✦ Communicate</div>
    </div>
  `;

  main.innerHTML = html;
  main.querySelectorAll('.phase-tab').forEach(btn => {
    btn.addEventListener('click', () => selectPhaseTab(btn.dataset.phase));
  });
  main.scrollTop = 0;
}
</script>
</body>
</html>
